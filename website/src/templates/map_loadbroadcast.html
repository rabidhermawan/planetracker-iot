{% block body %}
{{ super() }}
<main class="row">
  <div class="col" id="map">
    <button id="refreshButton">
        Button
      </button>
  </div>
  <div class="col"></div>
</main>
{% endblock %}


{% block scripts %}
{{ super() }}
<script>
    // Set map view
    // let map = L.map('map', {zoomControl: false, dragging: false}).setView([4.80568, 100.990448], 9);
    let map = L.map('map').setView([4.80568, 100.990448], 9);

    // map.dragging.disable()
    // map.maxZoom.disable()

    // Use OpenStreetMap for map visualization
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // Add popup
    var popup = L.popup();

    function onMapClick(e) {
      popup
        .setLatLng(e.latlng)
        .setContent("You clicked the map at " + e.latlng.toString())
        .openOn(map);
    }

    map.on('click', onMapClick);

    // Add polygon - Currently defined within Perak & Penak
    let polygon = L.polygon([
        [5.989, 101.87],  //Kanan Atas
        [3.620, 101.87],
        [3.620, 100.11],
        [5.989, 100.11],
        
        
    ]).addTo(map);


    let plane_marker = []

    // Get data from server for initialization
    let socket = io();
    
    socket.on('latest_data', function(plane_data) {
      plane_marker_amount = plane_marker.length;
    
      // Remove existing marker
      if (plane_marker_amount> 0) {
        for (let index = 0; index < plane_marker_amount; ++index){
          const removed = plane_marker.pop()
        
          if (removed != undefined) {
            map.removeLayer(removed)
          }
          }
      }    

      for (let index = 0; index < plane_data.length; ++index) {
        const element = plane_data[index];
        
        console.log(element);
        
        plane_marker.push(L.marker([element[6], element[5]]).addTo(map));
      }
    });


</script>
{% endblock %}
