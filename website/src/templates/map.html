     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="

  <!-- JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"

  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <link rel="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" href="style.css">
  <link rel="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" href="style.css">

  <style>
    #map { min-height: 100vh; }
  </style>
  
  </head>
<body>
  <div id="map"></div>
</body>
</html>

<script>
    function getRandomArbitrary(min, max) {
      return Math.random() * (max - min) + min;
    }
    // Set map view
    let map = L.map('map', {}).setView([4.80568, 100.990448], 9);
    // map.dragging.disable()
    // map.maxZoom.disable()

    // Use OpenStreetMap for map visualization
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    // Add popup
    var popup = L.popup();
    var layerControl = L.control.layers().addTo(map);

    var crownHill = L.marker([5, 100]).bindPopup('This is Crown Hill Park.'),
    rubyHill = L.marker([5.5, 100]).bindPopup('This is Ruby Hill Park.');
    
    var parks = L.layerGroup([crownHill, rubyHill]);

    function onMapClick(e) {
      popup
        .setLatLng(e.latlng)
        .setContent("You clicked the map at " + e.latlng.toString())
        .openOn(map);
    }

    map.on('click', onMapClick);

    // Add polygon - Currently defined within Perak & Penak
    // let apolygon = L.polygon([
    //     [5.989, 101.87],  //Kanan Atas
    //     [3.620, 101.87],
    //     [3.620, 100.11],
    //     [5.989, 100.11],
        
        
    // ]).addTo(map);
    let groupsies = L.markerClusterGroup({showCoverageOnHover: false}).addTo(map);
    let coverages = new L.LayerGroup();
    // ... Add more layers ...
    
    groupsies.on("animationend", function() {
  // Here getting clusters randomly, but you can decide which one you want to show coverage of.
      coverages.clearLayers();

      groupsies._featureGroup.eachLayer(function(layer) {
        if (layer instanceof L.MarkerCluster && layer.getChildCount() > 2) {
          //mcg._showCoverage({ layer: layer });
          coverages.addLayer(L.polygon(layer.getConvexHull()));
        }
        coverages.addTo(map);
      });
    });

    for (let i = 0; i < 50; ++i) {
      m = L.marker([getRandomArbitrary(3.620, 5.989), getRandomArbitrary(100.11, 101.87)]).addTo(map);
      groupsies.addLayer(m)
    }

    groupsies.fire("animationend");
    // marker = L.marker([51.5, -0.09]).addTo(map);
    
    // map.addLayer(markers);

</script>
