{% extends "base.html" %}
  
{% block head %}
{{ super() }}
<!-- Leaflet.JS -->
<!-- CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
   integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
   crossorigin=""/>   
<!-- JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
   integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
   crossorigin="">
</script>
<!-- Addons -->
<script src="{{ url_for('static', filename='js/leaflet/leaflet-heat.js') }}"></script>
<script src="{{ url_for('static', filename='js/leaflet-rotatedMarker.js') }}"></script>

<!-- Socket.io -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js" integrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA==" crossorigin="anonymous"></script>

<!-- Main logic -->


<!-- Map style, make it fill the screen -->
<style>
   #map { min-height: 100vh; }
   .leaflet-plane-div {
      background:transparent;
      color: rgb(0, 102, 204);
      height: 35px;
   }
   .leaflet-heatmap-layer {
      opacity: .5;
   }

   #toggleAirplaneHeatmap {
      position: absolute;
      top: 20px; /* Adjust vertical position */
      right: 20px; /* Adjust horizontal position */
      padding: 10px;
      z-index: 1001; /* Ensure it's above the map controls */
   }
</style>
{% endblock %}

{% block body %}
{{ super() }}
<div id="map"></div>
<button id="toggleAirplaneHeatmap" type="button">View Airplane Heatmap </button>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/live-map.js') }}"></script>
{% endblock %}
